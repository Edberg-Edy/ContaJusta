<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperação - Finanças</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #4f46e5; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="box">
    <h2 style="text-align:center;">Acesso ao App</h2>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <button onclick="criarConta()" style="background: #10b981;">Criar Conta</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDc3pdwFlSGdVkdFOSCUBJZpIRQOPmPc0o",
        authDomain: "financas-do-edy.firebaseapp.com",
        projectId: "financas-do-edy",
        storageBucket: "financas-do-edy.firebasestorage.app",
        messagingSenderId: "1087768862467",
        appId: "1:1087768862467:web:126da5464bc76725841336"
    };

    // Inicialização segura
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    async function fazerLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            alert("Sucesso! Recarregue a página.");
        } catch(e) { alert("Erro: " + e.message); }
    }

    async function criarConta() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await auth.createUserWithEmailAndPassword(email, pass);
            alert("Conta criada! Agora faça o login.");
        } catch(e) { alert("Erro ao criar: " + e.message); }
    }
</script>
</body>
</html>
