<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ContaJusta — Gestão de Grupos</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainHeader">CONTAJUSTA</header>

  <div id="navBar" class="nav-bar hidden">
    <button onclick="exitGroup()" class="secondary" style="width: auto; margin-top: 0; padding: 8px 16px;">
      ← Voltar aos Grupos
    </button>
    <div id="activeGroupName" style="font-weight: 700; color: var(--accent)"></div>
  </div>

  <main id="app">
    <!-- VIEW: GROUP LIST -->
    <div id="viewGroups">
      <div class="section-title">
        <span>📂 Meus Grupos</span>
        <button onclick="startCreateGroup()" class="success" style="width: auto; margin-top: 0; padding: 6px 12px;">+ Novo Grupo</button>
      </div>
      <div id="groupList" class="section-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
        <!-- Grupos injetados aqui -->
      </div>
    </div>

    <!-- VIEW: GROUP DETAIL -->
    <div id="viewDetail" class="hidden">
      <!-- Top Summary -->
      <div class="card" style="margin-bottom: var(--spacing);">
        <div class="section-title">📊 Dashboard do Grupo</div>

        <div class="dashboard-grid">
          <div class="kpi-box">
            <div class="kpi-label">Total Gasto</div>
            <div id="kpiTotal" class="kpi-value mono">R$ 0,00</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">Média/Membro</div>
            <div id="kpiAvg" class="kpi-value mono">R$ 0,00</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">Membros</div>
            <div id="kpiResidents" class="kpi-value mono" style="font-size: 1.1rem;">0</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">Despesas</div>
            <div id="kpiExpensesCount" class="kpi-value mono" style="font-size: 1.1rem;">0</div>
          </div>
        </div>

        <div id="summary" class="small">Adicione moradores para começar.</div>
        <div id="monthlyComparison"></div>
        <div class="hr"></div>

        <div style="margin-top: 15px;">
          <div class="small" style="margin-bottom: 8px;">Adicionar Morador</div>
          <div style="display: flex; gap: 8px;">
            <input id="name" placeholder="Novo morador..." style="margin-top:0" />
            <button onclick="addOrSaveResident()" class="success" style="margin-top:0; width: 60px;">+</button>
          </div>
        </div>
      </div>

      <!-- Expenses Section -->
      <div class="section-title">🧾 Gestão de Despesas</div>
      <div class="section-grid">
        <div class="card" style="position: sticky; top: 20px;">
          <div class="small">Cadastrar novo gasto</div>
          <input id="desc" placeholder="Descrição" />
          <input id="value" type="number" step="0.01" placeholder="Valor (R$)" />
          <select id="paidBy" aria-label="Quem pagou?"></select>
          <div style="margin-top: 10px;">
            <div class="small">Data do gasto</div>
            <input id="expenseDate" type="date" />
          </div>
          <button id="btnSaveExpense" onclick="addOrSaveExpense()">Salvar Lançamento</button>
        </div>
        <div id="expenses"></div>
      </div>

      <!-- Settlements Section -->
      <div class="section-title">🤝 Gestão de Acertos</div>
      <div class="section-grid">
        <div class="card">
          <div class="small">Registrar transferência</div>
          <select id="from" aria-label="Quem paga?"></select>
          <select id="to" aria-label="Quem recebe?"></select>
          <input id="amount" type="number" step="0.01" placeholder="Valor do acerto" />
          <button id="btnSaveSettlement" class="success" onclick="addOrSaveSettlement()">Confirmar Envio</button>
        </div>
        <div id="settlements"></div>
      </div>
    </div>
  </main>

  <!-- Modal de Edição -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <div class="section-title" id="modalTitle">Editar Registro</div>
      <div id="modalBody">
        <!-- Preenchido dinamicamente via JS -->
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="closeModal()" class="secondary">Cancelar</button>
        <button id="modalConfirmBtn">Salvar Alterações</button>
      </div>
    </div>
  </div>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <script src="app-core.js"></script>
  <script src="app-actions.js"></script>
</body>
</html>
