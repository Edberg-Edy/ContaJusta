<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finanças do Edy</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; }
        #app { display: none; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="app">
        <div class="box">
            <h1>Painel de Finanças</h1>
            <p>Seja bem-vindo de volta, Edy!</p>
            <div id="status-banco">Conectando ao seu banco de dados...</div>
            <button onclick="auth.signOut(); location.reload();" style="margin-top:20px;">Sair</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDc3pdwFlSGdVkdFOSCUBJZpIRQOPmPc0o",
            authDomain: "financas-do-edy.firebaseapp.com",
            projectId: "financas-do-edy",
            storageBucket: "financas-do-edy.firebasestorage.app",
            messagingSenderId: "1087768862467",
            appId: "1:1087768862467:web:126da5464bc76725841336"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('app').style.display = 'block';
                
                // TESTE DE LEITURA DO BANCO
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists) {
                        document.getElementById('status-banco').innerText = "✅ Dados carregados com sucesso!";
                        console.log("Categorias encontradas:", doc.data().categorias);
                    } else {
                        document.getElementById('status-banco').innerText = "⚠️ Logado, mas nenhum documento 'users' encontrado.";
                    }
                } catch (e) {
                    document.getElementById('status-banco').innerText = "❌ Erro ao ler o banco: " + e.message;
                }
            } else {
                // Se não logado, recarrega para voltar à tela de login
                location.reload();
            }
        });
    </script>
</body>
</html>
