<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContaJusta - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h1>ContaJusta</h1>
      <p class="subtitle">Login funcionando! 🎉</p>
      <p id="user-name" style="text-align:center; margin-bottom:16px;"></p>
      <button id="btn-logout" type="button">Sair</button>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { logoutUser } from "./js/auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.getElementById("user-name").textContent = "Bem-vindo(a), " + user.displayName;
      }
    });

    document.getElementById("btn-logout").addEventListener("click", async () => {
      await logoutUser();
    });
  </script>
</body>
</html>
