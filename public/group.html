<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContaJusta - Grupo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="login-box" id="loading-box">
      <h1>ContaJusta</h1>
      <p class="subtitle">Carregando grupo...</p>
    </div>

    <div class="login-box hidden" id="group-box" style="max-width: 460px;">
      <a href="dashboard.html" class="link-button" style="margin-top:0; text-align:left;">← Meus grupos</a>
      <h1 id="group-name"></h1>
      <p class="subtitle" id="group-type"></p>

      <div id="invite-code-box" class="hidden">
        <p class="section-label">Código de convite</p>
        <p class="invite-code" id="invite-code"></p>
      </div>

      <div id="pending-box" class="hidden">
        <p class="section-label">Solicitações pendentes</p>
        <div id="pending-list"></div>
      </div>

      <p class="section-label">Membros</p>
      <div id="members-list"></div>
    </div>

    <p id="error-message" class="error hidden"></p>
  </div>

  <script type="module" src="js/group.js"></script>
</body>
</html>
